apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namePrefix: qa-
images:
  - name: nginx
    newTag: "1.23.1" # Promoting to a newer/verified version
patches:
  - target:
      kind: Deployment
      name: my-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2 # QA needs more replicas for testing